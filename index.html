<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Šuká právě teď Damián?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-custom {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-calculating {
            animation: pulse-custom 1.5s infinite ease-in-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-result {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes eggplant-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(20deg) scale(1.2); }
            100% { transform: rotate(0deg) scale(1); }
        }
        .eggplant-animate {
            display: inline-block;
            animation: eggplant-spin 2s infinite ease-in-out;
            font-size: 3rem;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100">

    <div class="max-w-md w-full text-center">
        <div id="initialState" class="space-y-8">
            <div class="space-y-2">
                <h1 class="text-4xl font-bold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                    Šuká právě teď Damián?
                </h1>
                <p class="text-slate-400">Klikni pro spuštění hloubkové analýzy sexu</p>
            </div>
            
            <button onclick="askSchoolQuestion()" id="mainButton"
                class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-indigo-600 rounded-full hover:bg-indigo-500 shadow-xl shadow-indigo-500/20">
                <span class="flex items-center gap-2 text-lg">
                    Zjistit stav 🍑
                </span>
            </button>
        </div>

        <div id="schoolQuestionState" class="hidden space-y-8 animate-result">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-2xl font-semibold mb-6">Je Damián právě teď ve škole?</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleSchoolResponse(true)" class="bg-indigo-600 text-white font-bold py-4 rounded-2xl">Ano, je</button>
                    <button onclick="handleSchoolResponse(false)" class="bg-indigo-600 text-white font-bold py-4 rounded-2xl">Ne, není</button>
                </div>
            </div>
        </div>

        <div id="calculatingState" class="hidden space-y-8 animate-calculating">
            <div class="relative flex justify-center">
                <div class="w-28 h-28 border-4 border-indigo-500/10 border-t-indigo-500 rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="eggplant-animate">🍆</span>
                </div>
            </div>
            <div class="space-y-3">
                <p id="loadingText" class="text-xl text-indigo-300 italic h-8">Připojování...</p>
                <div class="w-64 mx-auto bg-slate-800 rounded-full h-1.5 overflow-hidden">
                    <div id="loadingBar" class="bg-indigo-500 h-full w-0 transition-all duration-[10000ms] linear"></div>
                </div>
            </div>
        </div>

        <div id="resultState" class="hidden space-y-6 animate-result">
            <div class="bg-slate-900 border border-slate-800 p-10 rounded-[2.5rem] shadow-2xl">
                <h2 id="resultText" class="text-3xl font-bold text-white"></h2>
                <p id="percentValue" class="text-indigo-400 mt-4"></p>
                <div class="w-full bg-slate-800 rounded-full h-4 mt-4">
                    <div id="finalBar" class="h-full bg-indigo-500" style="width:0%"></div>
                </div>
                <button onclick="resetDetector()" class="mt-6 text-sm underline">Zkusit znovu</button>
            </div>
        </div>
    </div>

<script>
function askSchoolQuestion() {
    document.getElementById('initialState').classList.add('hidden');
    document.getElementById('schoolQuestionState').classList.remove('hidden');
}

function handleSchoolResponse(isInSchool) {
    document.getElementById('schoolQuestionState').classList.add('hidden');
    if (isInSchool) {
        showResult(0);
    } else {
        startAnalysis();
    }
}

function startAnalysis() {
    document.getElementById('calculatingState').classList.remove('hidden');

    const loadingBar = document.getElementById('loadingBar');
    loadingBar.style.width = '100%';

    setTimeout(async () => {
        try {
            const res = await fetch("https://damian-7vzu.onrender.com/percentage");
            const data = await res.json();

            showResult(data.percentage);
        } catch (err) {
            console.error(err);
            showResult(0);
        }
    }, 10000);
}

function showResult(percentage) {
    document.getElementById('calculatingState').classList.add('hidden');
    document.getElementById('resultState').classList.remove('hidden');

    document.getElementById('resultText').innerText = 
        `Damián na ${percentage} % právě teď šuká.`;

    document.getElementById('percentValue').innerText = `${percentage} %`;
    document.getElementById('finalBar').style.width = percentage + "%";
}

function resetDetector() {
    location.reload();
}
</script>

</body>
</html>
